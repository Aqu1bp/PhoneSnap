name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-14 ships Swift 5.10 (the README's minimum-era toolchain),
        # macos-15 ships Swift 6 — build on both to catch strictness skew
        # between contributor machines and the oldest supported toolchain.
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build all targets
        run: swift build
      - name: Build the app bundle (documented quick-start path)
        run: ./scripts/build-app.sh
      - name: Wireless receiver smoke test
        run: ./scripts/smoke-test.sh
