name: Bug report
description: Report something that is broken or confusing in PhoneSnap.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the behavior you saw and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Capture mode
      options:
        - iPhone USB
        - Android ADB
        - Wireless Shortcut
        - Windows Safari batch (beta)
        - Windows WPD probe (experimental)
        - Build/install
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open PhoneSnap...
        2. Take a screenshot...
        3. ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "Example: macOS 15.5"
  - type: input
    id: windows
    attributes:
      label: Windows version and architecture
      placeholder: "Example: Windows 11 24H2, x64"
  - type: input
    id: ios
    attributes:
      label: iPhone/iPadOS version
      placeholder: "Example: iOS 18.5"
  - type: input
    id: android
    attributes:
      label: Android device/version and adb version
      placeholder: "Example: Pixel 8, Android 16, adb 36.0.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant terminal or receiver output, or attach screenshots if they help. Remove pair IDs, bearer tokens, setup URLs, and other sensitive data first.
      render: text
